version: "3.9"

services:
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sarah-network
    restart: unless-stopped

networks:
  sarah-network:
    external: true